<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body{font-family:'Inter',sans-serif;background-color:#030407} 
        .phobie-card{transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275)}
        .reveal-item{animation:popIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards;opacity:0;transform:scale(0.9) translateY(20px)}
        
        @keyframes popIn{to{opacity:1;transform:scale(1) translateY(0)}} 
        .modal-overlay{animation:fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards}
        .modal-overlay-out{animation:fadeOut 0.3s ease-in forwards} 
        
        /* Animasi Baru untuk Modal Dossier Holografik */
        .modal-dossier{animation:slideUpDossier 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards}
        .modal-dossier-out{animation:slideDownDossier 0.3s cubic-bezier(0.36,0,0.66,-0.56) forwards}
        
        .stat-item { animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateX(20px); }
        .ability-item { animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        
        .scanline::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.05) 51%, transparent 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }
        
        @keyframes fadeIn{from{opacity:0; backdrop-filter: blur(0px)}to{opacity:1; backdrop-filter: blur(16px)}} 
        @keyframes fadeOut{from{opacity:1; backdrop-filter: blur(16px)}to{opacity:0; backdrop-filter: blur(0px)}}
        @keyframes slideUpDossier{from{opacity:0;transform:scale(0.95) translateY(40px)}to{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes slideDownDossier{from{opacity:1;transform:scale(1) translateY(0)}to{opacity:0;transform:scale(0.95) translateY(40px)}}
        @keyframes slideInRight{to{opacity:1;transform:translateX(0)}}
        @keyframes slideInUp{to{opacity:1;transform:translateY(0)}}
        
        /* Floating Animation untuk Phobie di Modal */
        @keyframes floatIdle {
            0%, 100% { transform: translateY(0) scale(1.3); }
            50% { transform: translateY(-15px) scale(1.32); }
        }
        .float-anim { animation: floatIdle 4s ease-in-out infinite; }

        .hide-scrollbar::-webkit-scrollbar{display:none} .hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .tactical-btn{transition:all 0.3s cubic-bezier(0.4,0,0.2,1)} .active-glow{box-shadow:0 0 15px currentColor}
        .bg-grid{background-size:50px 50px;background-image:linear-gradient(to right,rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,0.03) 1px,transparent 1px)}
        .bg-hex{background-image: url("data:image/svg+xml,%3Csvg width='60' height='103.92304845413263' viewBox='0 0 60 103.92304845413263' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 103.92304845413263L0 86.60254037844386L0 51.96152422706631L30 34.64101615137755L60 51.96152422706631L60 86.60254037844386Z' fill='none' stroke='rgba(255,255,255,0.02)' stroke-width='1'/%3E%3Cpath d='M30 51.96152422706631L0 34.64101615137755L0 0L30 -17.320508075688775L60 0L60 34.64101615137755Z' fill='none' stroke='rgba(255,255,255,0.02)' stroke-width='1'/%3E%3C/svg%3E");}
        
        @keyframes flyUp{0%{top:110%;opacity:0;transform:rotate(0deg) translateX(0) scale(1)} 5%,95%{opacity:var(--opacity)} 100%{top:-20%;opacity:0;transform:rotate(var(--rotation)) translateX(var(--translateX)) scale(1.3)}}
        .particle{position:absolute;animation:flyUp var(--duration) linear infinite;animation-delay:var(--delay);will-change:top,transform,opacity}
        /* --- EFEK CYBERPUNK TAMBAHAN --- */
        .glass-panel { background: rgba(10, 12, 16, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tech-corner { position: relative; }
        .tech-corner::before, .tech-corner::after { content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid transparent; transition: all 0.4s ease; pointer-events: none; z-index: 20; }
        .tech-corner::before { top: 10px; left: 10px; border-top-color: rgba(255,255,255,0.5); border-left-color: rgba(255,255,255,0.5); }
        .tech-corner::after { bottom: 10px; right: 10px; border-bottom-color: rgba(255,255,255,0.5); border-right-color: rgba(255,255,255,0.5); }
        .group:hover .tech-corner::before { top: 0px; left: 0px; border-color: currentColor; box-shadow: -2px -2px 10px currentColor; }
        .group:hover .tech-corner::after { bottom: 0px; right: 0px; border-color: currentColor; box-shadow: 2px 2px 10px currentColor; }
        
        /* Select Dropdown Styling */
        select option { background-color: #0a0c10; color: #cbd5e1; }

</head>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const BASE_IMG_URL = "./images/", BASE_ICON_URL = "./images/icons/";

        // Array tag kemampuan terpisah dan eksklusif
        const ADVANCED_TAGS = [
            { id: 'Walking', label: 'Walking', icon: 'Icon_movement_walk.png', type: 'movement' },
            { id: 'Flying', label: 'Flying', icon: 'Icon_movement_fly.png', type: 'movement' },
            { id: 'Bypassing', label: 'Bypassing', icon: 'Bypass.png', type: 'movement' },
            { id: 'Single Target Attack', label: 'Single Target', icon: 'Icon_damage.png', type: 'damage' },
            { id: 'Self-Initiated Area of Effect', label: 'Self AoE', icon: 'Icon_self_aoe.png', type: 'damage' },
            { id: 'Targeted Area of Effect', label: 'Targeted AoE', icon: 'Icon_aoe_targeted.png', type: 'damage' },
            { id: 'Line of Sight', label: 'Line of Sight', icon: 'Icon_range_line_of_sight.png', type: 'range' },
            { id: 'Lob', label: 'Lob', icon: 'Icon_range_lob.png', type: 'range' },
            { id: 'Poison', label: 'Poison', icon: 'Icon_poison.png', type: 'element' },
            { id: 'Electric', label: 'Electric', icon: 'Icon_electrical.png', type: 'element' },
            { id: 'Fire', label: 'Fire', icon: 'Icon_fire.png', type: 'element' },
            { id: 'Disease', label: 'Disease', icon: 'Icon_disease.png', type: 'element' }
        ];

        // Format Stat Terpisah Angka dan Tipe+Ikon sesuai Gambar Asli
        const FormattedStat = ({ type, value }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [type, value]);
            if (!value || value === '-') return <span className="text-slate-500 italic">-</span>;
            
            if (type === 'health') {
                return (
                    <div className="flex flex-col gap-1 mt-1">
                        <div className="flex items-center gap-2">
                            <span className="text-2xl sm:text-3xl font-black text-white leading-none">{value}</span>
                            <img src={BASE_ICON_URL + "Icon_health.png"} alt="HP" className="w-5 h-5 sm:w-6 sm:h-6 object-contain drop-shadow-[0_2px_4px_rgba(244,63,94,0.5)]" />
                        </div>
                    </div>
                );
            }
            
            if (type === 'movement' || type === 'range') {
                const match = value.toString().match(/^(\d+)\s+(.+)$/);
                if (match) {
                    const num = match[1];
                    const text = match[2];
                    let icon = null;
                    if (type === 'movement') icon = text.includes('Flying') ? 'Icon_movement_fly.png' : text.includes('Bypassing') ? 'Bypass.png' : 'Icon_movement_walk.png';
                    else icon = text.includes('Lob') ? 'Icon_range_lob.png' : 'Icon_range_line_of_sight.png';
                    
                    return (
                        <div className="flex flex-col gap-1.5 mt-1">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl sm:text-3xl font-black text-white leading-none">{num}</span>
                            </div>
                            <div className="flex items-center gap-2 text-[11px] sm:text-xs text-slate-300 font-bold uppercase tracking-widest">
                                {text} {icon && <img src={BASE_ICON_URL + icon} className="w-4 h-4 object-contain drop-shadow-md" />}
                            </div>
                        </div>
                    );
                }
                return <span>{value}</span>;
            }

            if (type === 'damage') {
                const parts = value.toString().split(',').map(s => s.trim());
                return (
                    <div className="flex flex-col gap-3 mt-1.5 w-full">
                        {parts.map((part, idx) => {
                            let numMatch = part.match(/^(\d+%?)\s+(.+)$/);
                            let num = '';
                            let text = part;
                            
                            if (numMatch) {
                                num = numMatch[1];
                                text = numMatch[2];
                            }

                            let multi = '';
                            const multiMatch = text.match(/(.*?)\s*\*(\d+|∞)$/);
                            if (multiMatch) {
                                text = multiMatch[1].trim();
                                multi = multiMatch[2];
                            }

                            let extra = '';
                            if (text.includes('1 50%')) { extra = '1 (-50%)'; text = text.replace(' 1 50%', ''); }
                            else if (text.includes(' 1')) { extra = '1'; text = text.replace(' 1', ''); }

                            let icon = null;
                            let mainIcon = 'Icon_damage.png';
                            
                            if (text.includes('Self-Initiated')) icon = 'Icon_self_aoe.png';
                            else if (text.includes('Targeted Area')) icon = 'Icon_aoe_targeted.png';
                            else if (text.includes('Poison')) { icon = 'Icon_poison.png'; mainIcon = 'Icon_poison.png'; }
                            else if (text.includes('Electric')) { icon = 'Icon_electrical.png'; mainIcon = 'Icon_electrical.png'; }
                            else if (text.includes('Disease')) { icon = 'Icon_disease.png'; mainIcon = 'Icon_disease.png'; }
                            else if (text.includes('Fire')) { icon = 'Icon_fire.png'; mainIcon = 'Icon_fire.png'; }
                            else if (text.includes('Leech')) { icon = 'Icon_leech.png'; mainIcon = 'Icon_leech.png'; }
                            else if (text.includes('Heal')) { icon = 'Icon_heartheal.png'; mainIcon = 'Icon_heartheal.png'; }
                            
                            return (
                                <div key={idx} className="flex flex-col gap-2 bg-amber-950/20 border-l-2 border-amber-500/50 rounded-r-lg px-3 py-2.5 shadow-[inset_2px_0_10px_rgba(245,158,11,0.05)]">
                                    <div className="flex items-center gap-2">
                                        <span className="text-2xl sm:text-3xl font-black text-white leading-none">{num}</span>
                                        <img src={BASE_ICON_URL + mainIcon} className="w-5 h-5 object-contain drop-shadow-[0_2px_4px_rgba(245,158,11,0.5)]" />
                                        {multi && <span className="inline-flex items-center text-[10px] text-amber-300 ml-1 bg-amber-950/60 px-1.5 py-0.5 rounded border border-amber-500/40 tracking-wider"><i data-lucide="hourglass" className="w-3 h-3 mr-1"></i> x{multi}</span>}
                                        {extra && <span className="inline-flex items-center text-[10px] text-rose-300 ml-1 bg-rose-950/60 px-1.5 py-0.5 rounded border border-rose-500/40 tracking-wider"><i data-lucide="radar" className="w-3 h-3 mr-1"></i> {extra}</span>}
                                    </div>
                                    <div className="flex items-center gap-2 text-[11px] sm:text-xs text-amber-200/80 font-bold uppercase tracking-wider">
                                        {text} {icon && <img src={BASE_ICON_URL + icon} className="w-4 h-4 object-contain drop-shadow-md" />}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            }

            return <span>{value}</span>;
        };
