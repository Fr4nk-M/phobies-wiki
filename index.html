    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030407; }
        .phobie-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .reveal-item { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform: scale(0.9) translateY(20px); }
        @keyframes popIn { to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-overlay { animation: fadeIn 0.3s ease-out forwards; }
        .modal-overlay-out { animation: fadeOut 0.3s ease-in forwards; }
        .modal-content { animation: scaleUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .modal-content-out { animation: scaleDown 0.3s cubic-bezier(0.36, 0, 0.66, -0.56) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.8) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes scaleDown { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.7) translateY(40px); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tactical-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-glow { box-shadow: 0 0 15px currentColor; }
        
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }
        
        @keyframes flyUp {
            0% { top: 110%; opacity: 0; transform: rotate(0deg) translateX(0) scale(1); }
            5% { opacity: var(--opacity); }
            95% { opacity: var(--opacity); }
            100% { top: -20%; opacity: 0; transform: rotate(var(--rotation)) translateX(var(--translateX)) scale(1.3); }
        }

        .particle {
            position: absolute;
            animation: flyUp var(--duration) linear infinite;
            animation-delay: var(--delay);
            will-change: top, transform, opacity;
        }
    </style>

                            let content = part;
                            
                            content = content.replace('Self-Initiated Area of Effect', 'Self-Initiated Area of Effect&nbsp;<img src="https://static.wikia.nocookie.net/phobies/images/e/eb/Icon_self_aoe.png/revision/latest?cb=20220425084308" alt="SAoE" class="inline w-4 h-4 object-contain align-text-bottom drop-shadow-md" />');

                            content = content.replace(/1 50%/g, '<span class="inline-flex items-center text-[8px] text-rose-300 ml-1.5 bg-rose-950/60 px-1.5 py-0.5 rounded-md border border-rose-500/40 tracking-wider align-middle whitespace-nowrap shadow-[0_0_8px_rgba(244,63,94,0.2)]" title="1 tile radius with 50% damage reduction at the edges"><i data-lucide="radar" class="w-2.5 h-2.5 mr-1"></i> 1 (-50%)</span>');

                    { race: "Mechanical", icon: "https://static.wikia.nocookie.net/phobies/images/8/85/Mechanical_Icon.png/revision/latest?cb=20230803184337", glow: "drop-shadow(0 0 10px rgba(34,211,238,0.9))" },
                    { race: "Undead", icon: "https://static.wikia.nocookie.net/phobies/images/3/32/Undead_Icon.png/revision/latest?cb=20230803184125", glow: "drop-shadow(0 0 10px rgba(74,222,128,0.9))" },
                    { race: "Dimensional", icon: "https://static.wikia.nocookie.net/phobies/images/5/5b/Dimensional_Icon.png/revision/latest?cb=20230803184202", glow: "drop-shadow(0 0 10px rgba(192,132,252,0.9))" }
                ];
                
                const sizes = [20, 35, 50, 65, 80]; 
                
                return Array.from({ length: 40 }).map((_, i) => {
                    const selectedRace = raceTypes[Math.floor(Math.random() * raceTypes.length)];
                    const selectedSize = sizes[Math.floor(Math.random() * sizes.length)];
                    
                    return {
                        id: i,
                        icon: selectedRace.icon,
                        glow: selectedRace.glow,
                        left: `${Math.random() * 100}%`,
                        size: `${selectedSize}px`,
                        duration: `${Math.random() * 25 + 15}s`,
                        delay: `-${Math.random() * 40}s`,
                        rotation: `${Math.random() * 720 - 360}deg`,
                        translateX: `${Math.random() * 200 - 100}px`,
                        opacity: Math.random() * 0.15 + 0.1
                    };
                });
            }, []);

            const baseFiltered = useMemo(() => {
                return PHOBIES_DATA.filter(p => {
                    const matchSearch = p.name.toLowerCase().includes(search.toLowerCase());
                    const matchRarity = filterRarity === 'All' || p.rarity === filterRarity;
                    const matchRace = filterRace === 'All' || p.race === filterRace;
                    return matchSearch && matchRarity && matchRace;
                });
            }, [search, filterRarity, filterRace]);

            const keysToDisplay = filterKey === 'All' ? keys : [parseInt(filterKey)];
            
            const hasAnyResults = keysToDisplay.some(keyVal => baseFiltered.some(p => p.key === keyVal));

            const getRaceBg = (race) => {
                switch (race) {
                    case "Monster": return "bg-gradient-to-br from-red-950/90 to-red-900/50";
                    case "Mechanical": return "bg-gradient-to-br from-cyan-950/90 to-cyan-900/50";
                    case "Undead": return "bg-gradient-to-br from-green-950/90 to-green-900/50";
                    case "Dimensional": return "bg-gradient-to-br from-purple-950/90 to-purple-900/50";
                    default: return "bg-[#161920]";
                }
            };

            const getRarityBorder = (rarity) => {
                switch (rarity) {
                    case "Common": return "border-white shadow-[0_0_15px_rgba(255,255,255,0.15)]";
                    case "Uncommon": return "border-[#CD7F32] shadow-[0_0_15px_rgba(205,127,50,0.25)]";
                    case "Rare": return "border-[#A1B8D1] shadow-[0_0_15px_rgba(161,184,209,0.35)]";
                    case "Ultra Rare": return "border-[#FFD700] shadow-[0_0_25px_rgba(255,215,0,0.45)]";
                    default: return "border-white/5";
                }
            };

            const getRaceTextColorWithShine = (race) => {
                switch (race) {
                    case "Monster": return "text-red-400 drop-shadow-[0_2px_12px_rgba(248,113,113,0.8)]";
                    case "Mechanical": return "text-cyan-400 drop-shadow-[0_2px_12px_rgba(34,211,238,0.8)]";
                    case "Undead": return "text-green-400 drop-shadow-[0_2px_12px_rgba(74,222,128,0.8)]";
                    case "Dimensional": return "text-purple-400 drop-shadow-[0_2px_12px_rgba(192,132,252,0.8)]";
                    default: return "text-white";
                }
            };

            const getAbilityStyles = (race) => {
                const styles = {
                    "Monster": {
                        container: "bg-red-950/40 border-red-500/30",
                        icon: "text-red-400",
                        iconWrapper: "bg-red-500/20 border-red-500/30",
                        title: "text-red-400 shadow-red-500/50",
                        passiveItem: "bg-red-950/80 border-red-400 text-red-50 shadow-[0_0_10px_rgba(248,113,113,0.15)]",
                        activeItem: "bg-red-950/80 border-red-500/40 text-red-50 shadow-[0_0_10px_rgba(248,113,113,0.15)]",
                        dot: "bg-red-400"
                    },
                    "Mechanical": {
                        container: "bg-cyan-950/40 border-cyan-500/30",
                        icon: "text-cyan-400",
                        iconWrapper: "bg-cyan-500/20 border-cyan-500/30",
                        title: "text-cyan-400 shadow-cyan-500/50",
                        passiveItem: "bg-cyan-950/80 border-cyan-400 text-cyan-50 shadow-[0_0_10px_rgba(34,211,238,0.15)]",
                        activeItem: "bg-cyan-950/80 border-cyan-500/40 text-cyan-50 shadow-[0_0_10px_rgba(34,211,238,0.15)]",
                        dot: "bg-cyan-400"
                    },
                    "Undead": {
                        container: "bg-green-950/40 border-green-500/30",
                        icon: "text-green-400",
                        iconWrapper: "bg-green-500/20 border-green-500/30",
                        title: "text-green-400 shadow-green-500/50",
                        passiveItem: "bg-green-950/80 border-green-400 text-green-50 shadow-[0_0_10px_rgba(74,222,128,0.15)]",
                        activeItem: "bg-green-950/80 border-green-500/40 text-green-50 shadow-[0_0_10px_rgba(74,222,128,0.15)]",
                        dot: "bg-green-400"
                    },
                    "Dimensional": {
                        container: "bg-purple-950/40 border-purple-500/30",
                        icon: "text-purple-400",
                        iconWrapper: "bg-purple-500/20 border-purple-500/30",
                        title: "text-purple-400 shadow-purple-500/50",
                        passiveItem: "bg-purple-950/80 border-purple-400 text-purple-50 shadow-[0_0_10px_rgba(192,132,252,0.15)]",
                        activeItem: "bg-purple-950/80 border-purple-500/40 text-purple-50 shadow-[0_0_10px_rgba(192,132,252,0.15)]",
                        dot: "bg-purple-400"
                    }
                };
                return styles[race] || styles["Monster"];
            };

            // Konfigurasi visual untuk progress bar masing-masing stat
            const statConfig = {
                health: {
                    label: 'HP', icon: 'heart', max: 3000,
                    text: 'text-rose-400', gradFrom: 'from-rose-500', gradTo: 'to-rose-400', bgGlow: 'bg-rose-600',
                    barGlow: 'shadow-[0_0_12px_rgba(244,63,94,0.6)]'
                },
                damage: {
                    label: 'DMG', icon: 'swords', max: 1000,
                    text: 'text-amber-400', gradFrom: 'from-amber-600', gradTo: 'to-amber-400', bgGlow: 'bg-amber-600',
                    barGlow: 'shadow-[0_0_12px_rgba(245,158,11,0.6)]'
                },
                movement: {
                    label: 'MOV', icon: 'navigation', max: 3,
                    text: 'text-cyan-400', gradFrom: 'from-cyan-600', gradTo: 'to-cyan-400', bgGlow: 'bg-cyan-600',
                    barGlow: 'shadow-[0_0_12px_rgba(34,211,238,0.6)]'
                },
                range: {
                    label: 'RNG', icon: 'crosshair', max: 3,
                    text: 'text-purple-400', gradFrom: 'from-fuchsia-600', gradTo: 'to-purple-400', bgGlow: 'bg-purple-600',
                    barGlow: 'shadow-[0_0_12px_rgba(192,132,252,0.6)]'
                }
            };

            // Render komponen StatBar ala RPG
            const renderStatCard = (type, value) => {
                const config = statConfig[type];
                const numVal = getNumericValue(value);
                const percentage = Math.min(100, Math.max(0, (numVal / config.max) * 100));

                return (
                    <div className="flex flex-col gap-2 p-3 bg-black/60 rounded-2xl border border-white/10 relative overflow-hidden group/stat shadow-inner">
                        {/* Latar belakang bercahaya (glow) yang memudar */}
                        <div className={`absolute -right-6 -top-6 w-24 h-24 rounded-full blur-[20px] opacity-10 transition-opacity duration-500 group-hover/stat:opacity-30 ${config.bgGlow}`}></div>

                        <div className={`flex items-center gap-1.5 text-[9px] font-black uppercase tracking-widest relative z-10 ${config.text}`}>
                            <i data-lucide={config.icon} className="w-3.5 h-3.5"></i> {config.label}
                        </div>

                        {/* Track Progress Bar */}
                        <div className="h-1.5 w-full bg-[#030407] rounded-full border border-white/10 overflow-visible relative z-10 mt-0.5 mb-1.5">
                            {/* Isi Progress Bar */}
                            <div
                                className={`h-full rounded-full bg-gradient-to-r ${config.gradFrom} ${config.gradTo} relative ${config.barGlow}`}
                                style={{ width: `${percentage}%`, transition: 'width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275)' }}
                            >
                                {/* Animasi detak (pulse) di dalam bar */}
                                <div className="absolute inset-0 bg-white/20 animate-pulse rounded-full"></div>
                                {/* Efek pantulan cahaya ala kaca di bagian atas bar */}
                                <div className="absolute top-0 left-0 right-0 h-[40%] bg-gradient-to-b from-white/50 to-transparent rounded-t-full"></div>
                            </div>
                        </div>

                        <div className="text-[10px] sm:text-xs font-mono font-black text-white leading-relaxed break-words relative z-10">
                            <FormattedStat type={type} value={value} />
                        </div>
                    </div>
                );
            };

            return (
                <div className={`min-h-screen text-slate-200 selection:bg-purple-500/30 overflow-x-hidden transition-opacity duration-1000 relative ${isLoaded ? 'opacity-100' : 'opacity-0'}`}>
                    
                    <div className="fixed inset-0 z-[-1] overflow-hidden bg-[#030407] pointer-events-none">
                        <div className="absolute inset-0 bg-grid opacity-70" style={{ maskImage: 'linear-gradient(to bottom, black 20%, transparent 90%)', WebkitMaskImage: 'linear-gradient(to bottom, black 20%, transparent 90%)' }}></div>
                        
                        {particles.map(p => (
                            <img 
                                key={p.id}
                                src={p.icon}
                                alt="Particle"
                                className="particle object-contain"
                                style={{
                                    left: p.left,
                                    width: p.size,
                                    height: p.size,
                                    filter: p.glow,
                                    '--duration': p.duration,
                                    '--delay': p.delay,
                                    '--rotation': p.rotation,
                                    '--translateX': p.translateX,
                                    '--opacity': p.opacity
                                }}
                            />
                        ))}
                        
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-[#030407]/60 to-[#030407] shadow-[inset_0_0_150px_rgba(0,0,0,0.8)]"></div>
                    </div>

                    <header className={`sticky top-0 z-40 bg-[#0a0c10]/70 backdrop-blur-2xl border-b border-white/5 px-4 py-5 md:px-10 transition-all duration-700 ${isLoaded ? 'translate-y-0' : '-translate-y-full'}`}>
                        <div className="max-w-[1600px] mx-auto flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                            <div className="flex items-center gap-4 group cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                                <div className="w-12 h-12 bg-gradient-to-tr from-purple-600 via-indigo-600 to-cyan-500 rounded-xl flex items-center justify-center shadow-[0_0_30px_rgba(124,58,237,0.3)] group-hover:rotate-12 transition-transform duration-500">
                                    <i data-lucide="terminal" className="text-white"></i>
                                </div>
                                <div>
                                    <h1 className="flex items-center gap-2.5 text-xl font-black text-white tracking-tight leading-none italic uppercase">
                                        PHOBIES WIKI
                                        <img src="https://static.wikia.nocookie.net/phobies/images/4/4a/Site-favicon.ico/revision/latest?cb=20220720132947" alt="Phobies Logo" className="w-6 h-6 object-contain drop-shadow-md" />
                                    </h1>
                                    <div className="flex items-center gap-2 mt-1">
                                        <div className="h-1 w-10 bg-purple-500 rounded-full animate-pulse"></div>
                                        <p className="text-[9px] text-slate-500 uppercase tracking-[0.3em] font-black">Strategic Archive</p>
                                    </div>
                                </div>
                            </div>

                            <div className="relative flex-1 max-w-xl group">
                                <i data-lucide="search" className="absolute left-5 top-1/2 -translate-y-1/2 text-purple-400 group-focus-within:scale-110 transition-transform w-5 h-5"></i>
                                <input
                                    type="text"
                                    placeholder="Search archive..."
                                    className="w-full bg-white/5 border border-white/10 rounded-3xl py-3 pl-14 pr-12 focus:outline-none focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500/50 transition-all text-sm placeholder:text-slate-600 shadow-inner"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                                {search && (
                                    <button 
                                        onClick={() => setSearch('')}
                                        className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors"
                                    >
                                        <i data-lucide="x-circle" className="w-4 h-4"></i>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1600px] mx-auto p-4 md:p-10">
                        <div className={`mb-12 space-y-8 duration-1000 delay-300 ${isLoaded ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                            <div className="flex justify-between items-end mb-4">
                                <div className="w-full">
                                    {hasActiveFilters && (
                                        <div className="flex justify-end mb-4">
                                            <button 
                                                onClick={clearFilters}
                                                className="flex items-center gap-2 px-4 py-2 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/30 rounded-full text-[10px] font-black uppercase tracking-wider transition-all"
                                            >
                                                <i data-lucide="filter-x" className="w-3.5 h-3.5"></i>
                                                Clear All Filters
                                            </button>
                                        </div>
                                    )}
                                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                                        <div className="space-y-8">
                                            <div className="space-y-3">
                                                <div className="flex items-center gap-3 ml-2">
                                                    <i data-lucide="activity" className="text-rose-500 animate-pulse w-4 h-4"></i>
                                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em]">Race</h3>
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    <button
                                                        onClick={() => setFilterRace('All')}
                                                        className={`tactical-btn px-4 py-1.5 rounded-lg border-2 text-[9px] font-black uppercase tracking-[0.2em] ${filterRace === 'All' ? 'bg-white/10 border-white text-white active-glow' : 'bg-black/40 border-white/5 text-slate-600 hover:border-white/20'}`}
                                                    >
                                                        All Races
                                                    </button>
                                                    {races.map((r) => {
                                                        const isActive = filterRace === r;
                                                        return (
                                                            <button
                                                                key={r}
                                                                onClick={() => setFilterRace(r)}
                                                                className={`tactical-btn px-4 py-1.5 rounded-lg border-2 text-[9px] font-black uppercase tracking-[0.2em] flex items-center gap-2 ${isActive ? 'bg-white/10 border-white text-white active-glow' : 'bg-black/40 border-white/5 text-slate-600'}`}
                                                            >
                                                                {r}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>

                                            <div className="space-y-3">
                                                <div className="flex items-center gap-3 ml-2">
                                                    <i data-lucide="layers" className="text-cyan-500 w-4 h-4"></i>
                                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em]">Rarity</h3>
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    <button
                                                        onClick={() => setFilterRarity('All')}
                                                        className={`tactical-btn px-4 py-1.5 rounded-lg border-2 text-[9px] font-black uppercase tracking-[0.2em] ${filterRarity === 'All' ? 'bg-white/10 border-white text-white active-glow' : 'bg-black/40 border-white/5 text-slate-600 hover:border-white/20'}`}
                                                    >
                                                        All Rarities
                                                    </button>
                                                    {rarities.map((rare) => {
                                                        const isActive = filterRarity === rare;
                                                        return (
                                                            <button
                                                                key={rare}
                                                                onClick={() => setFilterRarity(rare)}
                                                                className={`tactical-btn px-4 py-1.5 rounded-lg border-2 text-[9px] font-black uppercase tracking-[0.2em] ${isActive ? 'bg-white/10 border-white text-white active-glow' : 'bg-black/40 border-white/5 text-slate-600'}`}
                                                            >
                                                                {rare}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-3 p-6 bg-[#11141b]/40 rounded-3xl border border-white/5 backdrop-blur-xl relative overflow-hidden group">
                                            <div className="flex items-center gap-3 relative z-10">
                                                <i data-lucide="hard-drive" className="text-indigo-500 w-4 h-4"></i>
                                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em]">Key Cost</h3>
                                            </div>
                                            <div className="grid grid-cols-5 sm:grid-cols-10 gap-2 mt-2 relative z-10">
                                                <button
                                                    onClick={() => setFilterKey('All')}
                                                    className={`aspect-square rounded-xl border-2 font-black text-lg flex items-center justify-center transition-all ${filterKey === 'All' ? 'bg-indigo-600 border-indigo-400 text-white shadow-[0_0_15px_rgba(79,70,229,0.5)]' : 'bg-black/60 border-white/5 text-slate-700 hover:border-indigo-500/50'}`}
                                                >
                                                    ∞
                                                </button>
                                                {keys.map((k) => (
                                                    <button
                                                        key={k}
                                                        onClick={() => setFilterKey(k.toString())}
                                                        className={`aspect-square rounded-xl border-2 font-mono font-black text-base flex items-center justify-center transition-all ${filterKey === k.toString() ? 'bg-purple-600 border-purple-400 text-white shadow-[0_0_15px_rgba(168,85,247,0.5)]' : 'bg-black/60 border-white/5 text-slate-700 hover:border-purple-500/50'}`}
                                                    >
                                                        {k}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {!hasAnyResults ? (
                            <div className="flex flex-col items-center justify-center py-24 sm:py-32 text-center reveal-item">
                                <div className="relative w-32 h-32 mb-6">
                                    <i data-lucide="ghost" className="w-full h-full text-slate-700/50 absolute top-0 left-0 animate-pulse"></i>
                                    <i data-lucide="search-x" className="w-12 h-12 text-rose-500 absolute bottom-0 right-0 drop-shadow-lg"></i>
                                </div>
                                <h2 className="text-2xl sm:text-3xl font-black text-white uppercase tracking-tighter mb-3">No Phobies Found</h2>
                                <p className="text-slate-500 max-w-md mx-auto mb-8 text-sm">
                                    Data tactical unit tidak ditemukan di dalam arsip. Coba ubah kata kunci pencarian atau bersihkan filter yang sedang aktif.
                                </p>
                                <button 
                                    onClick={clearFilters}
                                    className="px-8 py-3 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white rounded-full font-black uppercase tracking-widest text-xs transition-all shadow-[0_0_20px_rgba(124,58,237,0.4)] hover:shadow-[0_0_30px_rgba(124,58,237,0.6)] hover:-translate-y-1"
                                >
                                    Reset All Filters
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-24">
                                {keysToDisplay.map((keyVal) => {
                                    const phobiesForKey = baseFiltered.filter(p => p.key === keyVal);
                                    if (phobiesForKey.length === 0) return null;

                                    return (
                                        <section key={keyVal} className="relative group/section">
                                            <div className="sticky top-[100px] z-30 py-4 bg-[#020305]/95 backdrop-blur-md flex items-center gap-6 mb-8 sm:mb-12 border-b border-white/5">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-gradient-to-br from-purple-600 to-indigo-800 text-white rounded-xl flex items-center justify-center text-2xl font-black shadow-[0_10px_30px_rgba(124,58,237,0.3)] border border-purple-400/40 transform -rotate-2">
                                                        {keyVal}
                                                    </div>
                                                    <h2 className="flex items-center gap-2 text-2xl font-black text-white uppercase tracking-tighter italic">
                                                        KEY COST
                                                        <img src="https://static.wikia.nocookie.net/phobies/images/c/cd/Icon_KeyCost.png/revision/latest/scale-to-width-down/40?cb=20220310212118" alt="Key Cost" className="w-7 h-7 object-contain drop-shadow-[0_2px_5px_rgba(168,85,247,0.4)]" />
                                                    </h2>
                                                </div>
                                                <div className="ml-auto flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full border border-white/5">
                                                    <i data-lucide="layout-grid" className="text-slate-600 w-3 h-3"></i>
                                                    <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">{phobiesForKey.length} units</span>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6 pl-0 md:pl-8">
                                                {phobiesForKey.map((phobie, idx) => (
                                                    <div 
                                                        key={phobie.name + idx}
                                                        onClick={() => setSelectedPhobie(phobie)}
                                                        className={`phobie-card reveal-item group relative rounded-[1.5rem] border-[3px] p-4 sm:p-5 cursor-pointer hover:scale-[1.05] hover:-translate-y-2 hover:z-20 active:scale-95 active:brightness-125 transition-all duration-300 ${getRaceBg(phobie.race)} ${getRarityBorder(phobie.rarity)} overflow-visible min-h-[110px] sm:min-h-[130px] flex flex-col justify-between shadow-lg`}
                                                        style={{ animationDelay: `${(idx * 0.03)}s` }}
                                                    >
                                                        <div className="relative z-10 flex flex-col h-full pr-[80px] pointer-events-none">
                                                            <div className="mb-2.5 flex items-start">
                                                                <RarityBadge rarity={phobie.rarity} />
                                                            </div>
                                                            <h3 className={`text-[15px] sm:text-[16px] font-black transition-all duration-300 break-words leading-tight tracking-tight uppercase group-hover:tracking-wider ${getRaceTextColorWithShine(phobie.race)}`}>
                                                                {phobie.name}
                                                            </h3>
                                                            <div className="mt-auto pt-3">
                                                                <RaceBadge race={phobie.race} small />
                                                            </div>
                                                        </div>

                                                        <div className="absolute right-0 bottom-2 w-28 h-28 sm:w-32 sm:h-32 flex items-center justify-center pointer-events-none z-0">
                                                            <div className="w-full h-full flex items-center justify-center transform -scale-x-100 origin-center">
                                                                <img 
                                                                    src={phobie.image || "https://static.wikia.nocookie.net/phobies/images/4/4a/Site-favicon.ico/revision/latest?cb=20220720132947"} 
                                                                    alt={phobie.name} 
                                                                    className={`max-h-[85%] max-w-[85%] object-contain drop-shadow-[0_8px_15px_rgba(0,0,0,0.6)] transition-all duration-500 scale-[1.4] group-hover:scale-[1.7] group-hover:-rotate-12 group-hover:-translate-y-2 ${!phobie.image ? 'opacity-30 grayscale scale-100 group-hover:scale-125' : ''}`}
                                                                />
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {selectedPhobie && (
                        <div className={`fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 backdrop-blur-3xl overflow-y-auto ${isClosing ? 'modal-overlay-out' : 'modal-overlay'}`}>
                            <div className="absolute inset-0 bg-black/85" onClick={handleCloseDetail} />
                            
                            <div className={`relative w-full max-w-md rounded-[2.5rem] border-[6px] overflow-hidden shadow-[0_0_100px_rgba(0,0,0,1)] ${isClosing ? 'modal-content-out' : 'modal-content'} ${getRaceBg(selectedPhobie.race)} ${getRarityBorder(selectedPhobie.rarity)}`}>
                                
                                <div className="p-6 bg-black/60 border-b border-white/10 relative overflow-hidden text-center">
                                    
                                    <div className="absolute top-5 left-5 w-12 h-12 rounded-xl bg-black/70 border border-white/20 flex items-center justify-center text-xl font-black text-white shadow-2xl z-20">
                                        {selectedPhobie.key}
                                    </div>

                                    <button 
                                        onClick={handleCloseDetail} 
                                        className="absolute top-5 right-5 p-3 rounded-xl bg-black/40 hover:bg-rose-600 hover:text-white text-slate-400 transition-all z-20 group"
                                    >
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                    
                                    <div className="flex flex-col items-center gap-4 relative z-10 pt-4">
                                        
                                        <div className="w-full h-48 sm:h-56 relative flex items-center justify-center mt-4 mb-2 group/image">
                                            <div className="absolute inset-0 bg-white/5 blur-3xl rounded-full transition-opacity group-hover/image:opacity-40"></div>
                                            <img 
                                                src={selectedPhobie.image || "https://static.wikia.nocookie.net/phobies/images/4/4a/Site-favicon.ico/revision/latest?cb=20220720132947"} 
                                                alt={selectedPhobie.name} 
                                                className={`relative z-10 max-h-full object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.8)] transition-all duration-700 scale-[1.3] hover:scale-[1.4] group-hover/image:-rotate-6 group-hover/image:-translate-y-2 ${!selectedPhobie.image ? 'opacity-20 grayscale scale-100 hover:scale-110' : ''}`}
                                            />
                                        </div>

                                        <div className="space-y-1">
                                            <div className="flex justify-center mb-1"><RarityBadge rarity={selectedPhobie.rarity} /></div>
                                            <h2 className={`text-3xl font-black tracking-tighter leading-tight ${getRaceTextColorWithShine(selectedPhobie.race)}`}>
                                                {selectedPhobie.name}
                                            </h2>
                                            <div className="flex justify-center mt-2"><RaceBadge race={selectedPhobie.race} small /></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 bg-black/30">
                                    <div className="grid grid-cols-2 gap-3 mb-6">
                                        {renderStatCard('health', selectedPhobie.health)}
                                        {renderStatCard('damage', selectedPhobie.damage)}
                                        {renderStatCard('movement', selectedPhobie.movement)}
                                        {renderStatCard('range', selectedPhobie.range)}
                                    </div>

                                    {(() => {
                                        const hasPassive = selectedPhobie.passive !== '-';
                                        const hasActive = selectedPhobie.active !== '-';
                                        const passives = hasPassive ? selectedPhobie.passive.split(',').map(s => s.trim()) : [];
                                        const actives = hasActive ? selectedPhobie.active.split(',').map(s => s.trim()) : [];
                                        
                                        const abilityStyle = getAbilityStyles(selectedPhobie.race);

                                        if (!hasPassive && !hasActive) {
                                            return (
                                                <div className="pb-4">
                                                    <div className="p-4 bg-white/5 rounded-2xl border border-white/10 backdrop-blur-xl text-center flex flex-col items-center justify-center gap-2">
                                                        <i data-lucide="circle-slash" className="w-6 h-6 text-slate-500 opacity-50"></i>
                                                        <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest">No Special Abilities</div>
                                                    </div>
                                                </div>
                                            );
                                        }

                                        return (
                                            <div className="space-y-8 pb-4 text-left">
                                                {hasPassive && (
                                                    <div className={`p-4 rounded-[20px] border backdrop-blur-xl relative overflow-hidden group/ability ${abilityStyle.container}`}>
                                                        <div className="absolute -right-4 -top-4 p-4 opacity-10 group-hover/ability:scale-110 group-hover/ability:rotate-12 transition-transform duration-500">
                                                            <i data-lucide="shield" className={`w-20 h-20 ${abilityStyle.icon}`}></i>
                                                        </div>
                                                        <div className="flex items-center gap-2 mb-3 relative z-10">
                                                            <div className={`p-1.5 rounded-lg border ${abilityStyle.iconWrapper}`}>
                                                                <i data-lucide="shield" className={`w-3 h-3 ${abilityStyle.icon}`}></i>
                                                            </div>
                                                            <div className={`text-[9px] font-black uppercase tracking-[0.3em] drop-shadow-md ${abilityStyle.title}`}>Passive Ability</div>
                                                        </div>
                                                        <div className="flex flex-wrap gap-2 relative z-10">
                                                            {passives.map((p, i) => (
                                                                <div key={i} className={`px-3 py-1.5 border-l-2 rounded-r-lg text-xs font-bold italic ${abilityStyle.passiveItem}`}>
                                                                    {p}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                {hasActive && (
                                                    <div className={`p-4 rounded-[20px] border backdrop-blur-xl relative overflow-hidden group/ability ${abilityStyle.container}`}>
                                                        <div className="absolute -right-4 -top-4 p-4 opacity-10 group-hover/ability:scale-110 group-hover/ability:-rotate-12 transition-transform duration-500">
                                                            <i data-lucide="zap" className={`w-20 h-20 ${abilityStyle.icon}`}></i>
                                                        </div>
                                                        <div className="flex items-center gap-2 mb-3 relative z-10">
                                                            <div className={`p-1.5 rounded-full border ${abilityStyle.iconWrapper}`}>
                                                                <i data-lucide="zap" className={`w-3 h-3 ${abilityStyle.icon}`}></i>
                                                            </div>
                                                            <div className={`text-[9px] font-black uppercase tracking-[0.3em] drop-shadow-md ${abilityStyle.title}`}>Active Ability</div>
                                                        </div>
                                                        <div className="flex flex-wrap gap-2 relative z-10">
                                                            {actives.map((a, i) => (
                                                                <div key={i} className={`px-3 py-1.5 border-2 rounded-full text-xs font-bold italic flex items-center gap-2 ${abilityStyle.activeItem}`}>
                                                                    <div className={`w-1.5 h-1.5 rounded-full animate-pulse ${abilityStyle.dot}`}></div>
                                                                    {a}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })()}
                                </div>

                                <div className="p-4 bg-black/80 border-t border-white/10 text-center text-[8px] font-black text-slate-700 uppercase tracking-widest italic animate-pulse">
                                    Tactical Unit Archive // Encryption Level 1
                                </div>
                            </div>
                        </div>
                    )}

                    <button
                        onClick={scrollToTop}
                        className={`fixed bottom-8 right-8 p-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full shadow-[0_0_20px_rgba(79,70,229,0.5)] transition-all duration-500 z-40 group ${showScrollTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-16 pointer-events-none'}`}
                    >
                        <i data-lucide="arrow-up" className="w-6 h-6 group-hover:-translate-y-1 transition-transform"></i>
                    </button>

                    <footer className="max-w-[1600px] mx-auto px-10 py-32 border-t border-white/5 text-center relative">
                        <p className="text-slate-600 text-sm uppercase tracking-[0.8em] font-black opacity-30">Phobies Wiki Archive</p>
                        <p className="text-[9px] text-slate-800 mt-6 font-black uppercase tracking-[0.3em] flex items-center justify-center gap-3 italic">
                            Tactical Unit Database
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
